name: Package macOS Candidate

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/package-macos-candidate.yml"
      - "codex-cli/**"
      - "codex-rs/**"
      - "scripts/**"
  workflow_dispatch:
    inputs:
      release_version:
        description: "Release version override (defaults to codex-cli/package.json)"
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  package-darwin-arm64:
    name: Package macOS arm64 source build
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22

      - name: Resolve release version
        shell: bash
        run: |
          set -euo pipefail
          input_version="${{ inputs.release_version }}"
          if [[ -n "${input_version}" ]]; then
            version="${input_version}"
          else
            version="$(node -p "require('./codex-cli/package.json').version")"
          fi
          echo "RELEASE_VERSION=${version}" >> "$GITHUB_ENV"

      - name: Stage npm package
        shell: bash
        run: |
          set -euo pipefail
          stage_dir="${RUNNER_TEMP}/staging-codex-darwin-arm64"
          pack_output="${RUNNER_TEMP}/codex-darwin-arm64-${RELEASE_VERSION}.tgz"
          python3 codex-cli/scripts/build_npm_package.py \
            --package codex-darwin-arm64 \
            --release-version "${RELEASE_VERSION}" \
            --staging-dir "${stage_dir}" \
            --pack-output "${pack_output}"
          echo "PACK_OUTPUT=${pack_output}" >> "$GITHUB_ENV"

      - name: Verify source-build package payload
        shell: bash
        run: |
          set -euo pipefail
          tar -tzf "${PACK_OUTPUT}" | sort | tee "${RUNNER_TEMP}/package-files.txt"
          grep -qx "package/codex-rs/Cargo.toml" "${RUNNER_TEMP}/package-files.txt"
          grep -qx "package/scripts/postinstall_darwin_build.js" "${RUNNER_TEMP}/package-files.txt"
          if tar -xOf "${PACK_OUTPUT}" package/vendor/aarch64-apple-darwin/codex/codex >/dev/null 2>&1; then
            echo "unexpected prebuilt macOS codex binary in package" >&2
            exit 1
          fi

      - name: Upload macOS source-build package
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: codex-vl-darwin-arm64-source-${{ env.RELEASE_VERSION }}
          path: ${{ env.PACK_OUTPUT }}
