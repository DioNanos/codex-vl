name: package-linux-termux

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: "Release version override (defaults to codex-cli/package.json)"
        required: false
        type: string

jobs:
  build-linux-x64:
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_PROFILE_RELEASE_OPT_LEVEL: "3"
      CARGO_PROFILE_RELEASE_LTO: "thin"
      CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "16"
      CARGO_PROFILE_RELEASE_PANIC: "abort"
      CARGO_PROFILE_RELEASE_STRIP: "symbols"
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER: "x86_64-linux-musl-gcc"
    steps:
      - uses: actions/checkout@v4
      - name: Resolve release version
        run: |
          set -euo pipefail
          input_version="${{ inputs.release_version }}"
          if [ -n "$input_version" ]; then
            version="$input_version"
          else
            version="$(node -p "require('./codex-cli/package.json').version")"
          fi
          echo "RELEASE_VERSION=$version" >> "$GITHUB_ENV"
      - name: Install Linux musl build tools
        env:
          TARGET: x86_64-unknown-linux-musl
        run: |
          set -euo pipefail
          bash .github/scripts/install-musl-build-tools.sh
      - name: Build Linux x64 native payload
        run: |
          set -euo pipefail
          # codex-vl: explicit toolchain install pattern from codex-termux working
          # workflow. Plain `rustup target add` started failing silently on fresh
          # ubuntu-24.04 runners after the rust-v0.133.0 cycle.
          rustup toolchain install 1.95.0 --profile minimal --target x86_64-unknown-linux-musl
          rustup default 1.95.0
          rustup target add x86_64-unknown-linux-musl
          target="x86_64-unknown-linux-musl"
          version="$(python3 .github/scripts/rusty_v8_bazel.py resolved-v8-crate-version)"
          release_tag="rusty-v8-v${version}"
          base_url="https://github.com/openai/codex/releases/download/${release_tag}"
          binding_dir="${RUNNER_TEMP:-/tmp}/rusty_v8"
          archive_path="${binding_dir}/librusty_v8_release_${target}.a.gz"
          binding_path="${binding_dir}/src_binding_release_${target}.rs"
          checksums_path="${binding_dir}/rusty_v8_release_${target}.sha256"
          checksums_source="third_party/v8/rusty_v8_${version//./_}.sha256"
          mkdir -p "$binding_dir"
          curl -fsSL "${base_url}/librusty_v8_release_${target}.a.gz" -o "$archive_path"
          curl -fsSL "${base_url}/src_binding_release_${target}.rs" -o "$binding_path"
          grep -E "  (librusty_v8_release_${target}[.]a[.]gz|src_binding_release_${target}[.]rs)$" \
            "$checksums_source" > "$checksums_path"
          if [ "$(wc -l < "$checksums_path")" -ne 2 ]; then
            echo "Expected exactly two checksums for ${target} in ${checksums_source}" >&2
            exit 1
          fi
          (cd "$binding_dir" && sha256sum -c "$checksums_path")
          export RUSTY_V8_ARCHIVE="$archive_path"
          export RUSTY_V8_SRC_BINDING_PATH="$binding_path"
          echo "release profile: opt=${CARGO_PROFILE_RELEASE_OPT_LEVEL} lto=${CARGO_PROFILE_RELEASE_LTO} codegen-units=${CARGO_PROFILE_RELEASE_CODEGEN_UNITS} panic=${CARGO_PROFILE_RELEASE_PANIC} strip=${CARGO_PROFILE_RELEASE_STRIP}"
          cargo build --manifest-path codex-rs/Cargo.toml --target x86_64-unknown-linux-musl --release -p codex-bwrap
          bwrap_path="codex-rs/target/x86_64-unknown-linux-musl/release/bwrap"
          if [ ! -f "$bwrap_path" ]; then
            echo "bwrap binary ${bwrap_path} not found" >&2
            exit 1
          fi
          export CODEX_BWRAP_SHA256="$(sha256sum "$bwrap_path" | awk '{print $1}')"
          echo "bwrap sha256=${CODEX_BWRAP_SHA256}"
          cargo build --manifest-path codex-rs/Cargo.toml --target x86_64-unknown-linux-musl --release -p codex-cli
          cargo build --manifest-path codex-rs/Cargo.toml --target x86_64-unknown-linux-musl --release -p codex-exec
          before_codex="$(stat -c '%s' codex-rs/target/x86_64-unknown-linux-musl/release/codex)"
          before_exec="$(stat -c '%s' codex-rs/target/x86_64-unknown-linux-musl/release/codex-exec)"
          if command -v llvm-strip >/dev/null 2>&1; then
            llvm-strip --strip-all codex-rs/target/x86_64-unknown-linux-musl/release/codex codex-rs/target/x86_64-unknown-linux-musl/release/codex-exec
          elif command -v strip >/dev/null 2>&1; then
            strip --strip-all codex-rs/target/x86_64-unknown-linux-musl/release/codex codex-rs/target/x86_64-unknown-linux-musl/release/codex-exec
          fi
          after_codex="$(stat -c '%s' codex-rs/target/x86_64-unknown-linux-musl/release/codex)"
          after_exec="$(stat -c '%s' codex-rs/target/x86_64-unknown-linux-musl/release/codex-exec)"
          printf 'codex size: %s -> %s bytes\ncodex-exec size: %s -> %s bytes\n' "$before_codex" "$after_codex" "$before_exec" "$after_exec"
          ls -lh codex-rs/target/x86_64-unknown-linux-musl/release/codex codex-rs/target/x86_64-unknown-linux-musl/release/codex-exec
          codex-rs/target/x86_64-unknown-linux-musl/release/codex --version
      - name: Stage Linux x64 npm package
        run: |
          set -euo pipefail
          root="$HOME/.local/share/forgejo-artifacts/codex-vl/${GITHUB_SHA}/linux-x64"
          vendor="$root/vendor/x86_64-unknown-linux-musl"
          out="$root/npm"
          rm -rf "$root"
          mkdir -p "$vendor/codex" "$vendor/codex-resources" "$vendor/path" "$out"
          cp codex-rs/target/x86_64-unknown-linux-musl/release/codex "$vendor/codex/codex"
          cp codex-rs/target/x86_64-unknown-linux-musl/release/codex-exec "$vendor/codex/codex-exec"
          cp codex-rs/target/x86_64-unknown-linux-musl/release/bwrap "$vendor/codex-resources/bwrap"
          chmod 755 "$vendor/codex/codex" "$vendor/codex/codex-exec"
          chmod 755 "$vendor/codex-resources/bwrap"
          if command -v rg >/dev/null 2>&1; then
            cp "$(command -v rg)" "$vendor/path/rg"
            chmod 755 "$vendor/path/rg"
          else
            printf '#!/usr/bin/env sh\nexec grep "$@"\n' > "$vendor/path/rg"
            chmod 755 "$vendor/path/rg"
          fi
          python3 codex-cli/scripts/build_npm_package.py \
            --package codex-linux-x64 \
            --release-version "$RELEASE_VERSION" \
            --vendor-src "$root/vendor" \
            --staging-dir "$root/staging" \
            --pack-output "$out/codex-npm-linux-x64-$RELEASE_VERSION.tgz"
          find "$root" -maxdepth 5 -type f -print
      - name: Upload Linux x64 npm package
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: codex-vl-linux-x64-npm-${{ env.RELEASE_VERSION }}
          path: ~/.local/share/forgejo-artifacts/codex-vl/${{ github.sha }}/linux-x64/npm/*.tgz
          if-no-files-found: error

  build-android-arm64:
    needs: build-linux-x64
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_PROFILE_RELEASE_OPT_LEVEL: "3"
      CARGO_PROFILE_RELEASE_LTO: "thin"
      CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "16"
      CARGO_PROFILE_RELEASE_PANIC: "abort"
      CARGO_PROFILE_RELEASE_STRIP: "symbols"
    steps:
      - uses: actions/checkout@v4
      - name: Resolve release version
        run: |
          set -euo pipefail
          input_version="${{ inputs.release_version }}"
          if [ -n "$input_version" ]; then
            version="$input_version"
          else
            version="$(node -p "require('./codex-cli/package.json').version")"
          fi
          echo "RELEASE_VERSION=$version" >> "$GITHUB_ENV"
      - name: Locate Android NDK
        run: |
          set -euo pipefail
          ndk="${ANDROID_NDK_HOME:-${ANDROID_NDK_LATEST_HOME:-${ANDROID_NDK_ROOT:-}}}"
          if [ -z "$ndk" ] || [ ! -d "$ndk/toolchains/llvm/prebuilt/linux-x86_64/bin" ]; then
            for candidate in /usr/local/lib/android/sdk/ndk/*/ "$HOME/android-sdk/ndk"/*/ "$HOME/android-ndk"/*/; do
              candidate="${candidate%/}"
              if [ -d "$candidate/toolchains/llvm/prebuilt/linux-x86_64/bin" ]; then
                ndk="$candidate"
                break
              fi
            done
          fi
          if [ -z "$ndk" ] || [ ! -d "$ndk/toolchains/llvm/prebuilt/linux-x86_64/bin" ]; then
            echo "Android NDK not found on runner" >&2
            ls -la /usr/local/lib/android/sdk/ndk/ 2>&1 || true
            exit 1
          fi
          toolchain="$ndk/toolchains/llvm/prebuilt/linux-x86_64/bin"
          echo "Using Android NDK at $ndk"
          echo "ANDROID_NDK_HOME=$ndk" >> "$GITHUB_ENV"
          echo "CC_aarch64_linux_android=$toolchain/aarch64-linux-android29-clang" >> "$GITHUB_ENV"
          # CXX + RANLIB are required by C++ build scripts (oboe-sys, pulled in by
          # cpal for realtime audio). Without CXX, cc-rs falls back to a bare
          # aarch64-linux-android-clang++ which the NDK does not ship.
          echo "CXX_aarch64_linux_android=$toolchain/aarch64-linux-android29-clang++" >> "$GITHUB_ENV"
          echo "AR_aarch64_linux_android=$toolchain/llvm-ar" >> "$GITHUB_ENV"
          echo "RANLIB_aarch64_linux_android=$toolchain/llvm-ranlib" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$toolchain/aarch64-linux-android29-clang" >> "$GITHUB_ENV"
      - name: Build Android arm64 native payload
        run: |
          set -euo pipefail
          # codex-vl: explicit toolchain install pattern from codex-termux working
          # workflow. Plain `rustup target add` started failing silently on fresh
          # ubuntu-24.04 runners after the rust-v0.133.0 cycle.
          rustup toolchain install 1.95.0 --profile minimal --target aarch64-linux-android
          rustup default 1.95.0
          rustup target add aarch64-linux-android
          v8_env="$(python3 scripts/fetch_rusty_v8_android.py --target aarch64-linux-android)"
          printf '%s\n' "$v8_env"
          export RUSTY_V8_ARCHIVE="$(printf '%s\n' "$v8_env" | sed -n 's/^export RUSTY_V8_ARCHIVE="\([^"]*\)"$/\1/p')"
          export RUSTY_V8_SRC_BINDING_PATH="$(printf '%s\n' "$v8_env" | sed -n 's/^export RUSTY_V8_SRC_BINDING_PATH="\([^"]*\)"$/\1/p')"
          if [ -z "$RUSTY_V8_ARCHIVE" ] || [ -z "$RUSTY_V8_SRC_BINDING_PATH" ]; then
            echo "Failed to resolve Android rusty_v8 artifact overrides" >&2
            exit 1
          fi
          echo "release profile: opt=${CARGO_PROFILE_RELEASE_OPT_LEVEL} lto=${CARGO_PROFILE_RELEASE_LTO} codegen-units=${CARGO_PROFILE_RELEASE_CODEGEN_UNITS} panic=${CARGO_PROFILE_RELEASE_PANIC} strip=${CARGO_PROFILE_RELEASE_STRIP}"
          # v8 (code-mode JIT) references __clear_cache, a compiler-rt builtin.
          # With the release profile's -nodefaultlibs, the NDK does not auto-link
          # it, so link the compiler-rt builtins archive explicitly. The per-target
          # RUSTFLAGS env overrides .cargo/config.toml, so replicate its flags here.
          builtins="$(find "${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64" -name 'libclang_rt.builtins-aarch64-android.a' 2>/dev/null | head -1)"
          if [ -z "$builtins" ]; then echo "clang_rt builtins for aarch64-android not found under NDK" >&2; exit 1; fi
          echo "linking compiler-rt builtins: $builtins"
          export CARGO_TARGET_AARCH64_LINUX_ANDROID_RUSTFLAGS="-Clink-arg=-lc++_shared -Clink-arg=-Wl,-rpath,\$ORIGIN -Clink-arg=$builtins"
          cargo build --manifest-path codex-rs/Cargo.toml --target aarch64-linux-android --release -p codex-cli
          cargo build --manifest-path codex-rs/Cargo.toml --target aarch64-linux-android --release -p codex-exec
          before_codex="$(stat -c '%s' codex-rs/target/aarch64-linux-android/release/codex)"
          before_exec="$(stat -c '%s' codex-rs/target/aarch64-linux-android/release/codex-exec)"
          ndk_strip="${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip"
          if [ -x "$ndk_strip" ]; then
            "$ndk_strip" --strip-all codex-rs/target/aarch64-linux-android/release/codex codex-rs/target/aarch64-linux-android/release/codex-exec
          elif command -v llvm-strip >/dev/null 2>&1; then
            llvm-strip --strip-all codex-rs/target/aarch64-linux-android/release/codex codex-rs/target/aarch64-linux-android/release/codex-exec
          fi
          after_codex="$(stat -c '%s' codex-rs/target/aarch64-linux-android/release/codex)"
          after_exec="$(stat -c '%s' codex-rs/target/aarch64-linux-android/release/codex-exec)"
          printf 'codex size: %s -> %s bytes\ncodex-exec size: %s -> %s bytes\n' "$before_codex" "$after_codex" "$before_exec" "$after_exec"
          ls -lh codex-rs/target/aarch64-linux-android/release/codex codex-rs/target/aarch64-linux-android/release/codex-exec
      - name: Stage Android arm64 npm package
        run: |
          set -euo pipefail
          root="$HOME/.local/share/forgejo-artifacts/codex-vl/${GITHUB_SHA}/android-arm64"
          vendor="$root/vendor/aarch64-linux-android"
          out="$root/npm"
          rm -rf "$root"
          mkdir -p "$vendor/codex" "$out"
          cp codex-rs/target/aarch64-linux-android/release/codex "$vendor/codex/codex"
          cp codex-rs/target/aarch64-linux-android/release/codex-exec "$vendor/codex/codex-exec"
          chmod 755 "$vendor/codex/codex" "$vendor/codex/codex-exec"
          # Bundle libc++_shared.so next to the binaries: the Android binaries are
          # linked with RUNPATH=$ORIGIN and NEED libc++_shared.so (V8 + oboe use
          # the shared C++ runtime). Termux/Android has no system libc++_shared.so,
          # so it must travel inside the package or the binary fails to link at
          # runtime ("library libc++_shared.so not found").
          libcxx="$(find "${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64" -name 'libc++_shared.so' -path '*aarch64-linux-android*' 2>/dev/null | head -1)"
          if [ -z "$libcxx" ]; then echo "libc++_shared.so for aarch64-linux-android not found under NDK" >&2; exit 1; fi
          cp "$libcxx" "$vendor/codex/libc++_shared.so"
          chmod 755 "$vendor/codex/libc++_shared.so"
          python3 codex-cli/scripts/build_npm_package.py \
            --package codex-android-arm64 \
            --release-version "$RELEASE_VERSION" \
            --vendor-src "$root/vendor" \
            --staging-dir "$root/staging" \
            --pack-output "$out/codex-npm-android-arm64-$RELEASE_VERSION.tgz"
          find "$root" -maxdepth 5 -type f -print
      - name: Upload Android arm64 npm package
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: codex-vl-android-arm64-npm-${{ env.RELEASE_VERSION }}
          path: ~/.local/share/forgejo-artifacts/codex-vl/${{ github.sha }}/android-arm64/npm/*.tgz
          if-no-files-found: error
